<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AMG8833 — Mapa de calor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; padding: 20px; }
  h1 { font-size: 18px; font-weight: 500; color: #aaa; }
  #canvas { border-radius: 12px; width: 400px; height: 400px; }
  button { padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity .2s; }
  button:hover { opacity: 0.85; }
  #btn-connect { background: #4361ee; color: white; }
  #btn-disconnect { background: #e63946; color: white; display: none; }
  .stats { display: flex; gap: 32px; }
  .stat { text-align: center; }
  .stat .val { font-size: 26px; font-weight: 500; }
  .stat .lbl { font-size: 11px; color: #888; margin-top: 2px; }
  #tmin .val { color: #48cae4; }
  #tmax .val { color: #e63946; }
  #tavg .val { color: #f9c74f; }
  .legend { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #888; }
  .legend-bar { width: 200px; height: 12px; border-radius: 6px; background: linear-gradient(to right, #0466c8, #48cae4, #52b788, #f9c74f, #f3722c, #e63946); }
  #status { font-size: 12px; color: #666; }
  #status.ok { color: #52b788; }
  #status.err { color: #e63946; }
  .controls { display: flex; gap: 12px; align-items: center; }
  label { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<h1>AMG8833 — Mapa de calor en tiempo real</h1>

<canvas id="canvas" width="320" height="320"></canvas>

<div class="stats">
  <div class="stat" id="tmin"><div class="val" id="v-min">--</div><div class="lbl">mínima °C</div></div>
  <div class="stat" id="tavg"><div class="val" id="v-avg">--</div><div class="lbl">promedio °C</div></div>
  <div class="stat" id="tmax"><div class="val" id="v-max">--</div><div class="lbl">máxima °C</div></div>
</div>

<div class="legend">
  <span>frío</span>
  <div class="legend-bar"></div>
  <span>caliente</span>
</div>

<div class="controls">
  <button id="btn-connect" onclick="conectar()">Conectar ESP32</button>
  <button id="btn-disconnect" onclick="desconectar()">Desconectar</button>
  <label>
    <input type="checkbox" id="interp" checked>
    Interpolación suavizada
  </label>
</div>

<div id="status">Esperando conexión...</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const SIZE = 320;
let port, reader, running = false;

const STOPS = [
  [4,   102, 200],
  [72,  202, 228],
  [82,  183, 136],
  [249, 199, 79],
  [243, 114, 44],
  [230, 57,  70],
];

function tempToRGB(t, min, max) {
  const ratio = Math.max(0, Math.min(1, (t - min) / (max - min || 1)));
  const idx = ratio * (STOPS.length - 1);
  const i = Math.min(Math.floor(idx), STOPS.length - 2);
  const f = idx - i;
  return STOPS[i].map((v, j) => Math.round(v + f * (STOPS[i+1][j] - v)));
}

// Interpolación bilineal: expande 8x8 a NxN
function interpolar(grid, N) {
  const out = new Float32Array(N * N);
  const scale = 7 / (N - 1);
  for (let py = 0; py < N; py++) {
    for (let px = 0; px < N; px++) {
      const gx = px * scale;
      const gy = py * scale;
      const x0 = Math.floor(gx), x1 = Math.min(x0 + 1, 7);
      const y0 = Math.floor(gy), y1 = Math.min(y0 + 1, 7);
      const fx = gx - x0, fy = gy - y0;
      const v00 = grid[y0 * 8 + x0];
      const v10 = grid[y0 * 8 + x1];
      const v01 = grid[y1 * 8 + x0];
      const v11 = grid[y1 * 8 + x1];
      out[py * N + px] = v00*(1-fx)*(1-fy) + v10*fx*(1-fy) + v01*(1-fx)*fy + v11*fx*fy;
    }
  }
  return out;
}

function dibujar(pixels) {
  const min = Math.min(...pixels);
  const max = Math.max(...pixels);
  const avg = pixels.reduce((a, b) => a + b, 0) / pixels.length;

  const interp = document.getElementById('interp').checked;
  const N = interp ? SIZE : 8;
  const grid = interp ? interpolar(pixels, N) : pixels;
  const cellW = SIZE / N;

  const imgData = ctx.createImageData(SIZE, SIZE);
  const data = imgData.data;

  if (interp) {
    for (let i = 0; i < N * N; i++) {
      const [r, g, b] = tempToRGB(grid[i], min, max);
      const py = Math.floor(i / N);
      const px = i % N;
      const idx = (py * SIZE + px) * 4;
      data[idx]   = r;
      data[idx+1] = g;
      data[idx+2] = b;
      data[idx+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
  } else {
    // Sin interpolación: cuadros de 40x40
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        const [r, g, b] = tempToRGB(pixels[row * 8 + col], min, max);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(col * 40, row * 40, 40, 40);
      }
    }
  }

  document.getElementById('v-min').textContent = min.toFixed(1);
  document.getElementById('v-max').textContent = max.toFixed(1);
  document.getElementById('v-avg').textContent = avg.toFixed(1);
}

async function conectar() {
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    running = true;
    document.getElementById('btn-connect').style.display = 'none';
    document.getElementById('btn-disconnect').style.display = 'inline-block';
    setStatus('Conectado — leyendo sensor...', 'ok');
    leer();
  } catch (e) {
    setStatus('Error al conectar: ' + e.message, 'err');
  }
}

async function leer() {
  const decoder = new TextDecoderStream();
  port.readable.pipeTo(decoder.writable);
  reader = decoder.readable.getReader();
  let buffer = '';
  while (running) {
    try {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += value;
      const lineas = buffer.split('\n');
      buffer = lineas.pop();
      for (const linea of lineas) {
        const vals = linea.trim().split(',').map(Number).filter(v => !isNaN(v));
        if (vals.length === 64) dibujar(vals);
      }
    } catch (e) { break; }
  }
}

async function desconectar() {
  running = false;
  if (reader) await reader.cancel();
  if (port) await port.close();
  document.getElementById('btn-connect').style.display = 'inline-block';
  document.getElementById('btn-disconnect').style.display = 'none';
  setStatus('Desconectado.', '');
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}
</script>
</body>
</html>
